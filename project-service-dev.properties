
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.config.enabled=true
spring.cloud.config.import-check.enabled=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9999/realms/electricalonics_oms
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9999/realms/electricalonics_oms/protocol/openid-connect/certs

logging.level.org.springframework.security=DEBUG
