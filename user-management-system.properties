# ADD these two lines at the top
spring.application.name=user-management-system
server.port=8081

# Database
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/user-db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT
jwt.secret=5a8f3c1e9b2d7f4a6e0c8b5d3f1a9e7c2b4d6f8a0e3c5b7d9f1a3e5c7b9d2f4a
jwt.expiration=86400000
